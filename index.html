        let currentPage = 1;
        const itemsPerPage = 6;
        let filteredMenu = [];

        function renderMenuList(filter = "", category = "all", page = 1) {
            const menuList = document.getElementById('menuList');
            filteredMenu = menuData.filter(item =>
                (category === "all" || item.category === category) &&
                (item.name.toLowerCase().includes(filter) ||
                    item.desc.toLowerCase().includes(filter))
            );
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginated = filteredMenu.slice(start, end);

            menuList.innerHTML = paginated.length
                ? paginated.map(item => `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100 shadow-sm">
                            <img src="${item.img}" class="card-img-top" alt="${item.name}" style="height:180px;object-fit:cover;">
                            <div class="card-body">
                                <h5 class="card-title d-flex align-items-center">
                                    <span style="font-size:1.5rem;margin-right:8px;">${item.icon}</span>
                                    ${item.name}
                                </h5>
                                <p class="card-text text-muted">${item.desc}</p>
                                <div class="fw-bold text-primary">&#8377;${item.price}</div>
                            </div>
                        </div>
                    </div>
                `).join('')
                : `<div class="col-12 text-center text-muted">No menu items found.</div>`;

            renderPagination(page);
        }

        function renderPagination(page) {
            const paginationNav = document.getElementById('paginationNav');
            const totalPages = Math.ceil(filteredMenu.length / itemsPerPage);
            let html = '';

            // Prev button
            html += `<li class="page-item${page === 1 ? ' disabled' : ''}">
                        <a class="page-link" href="#" aria-label="Previous" data-page="${page - 1}">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item${i === page ? ' active' : ''}">
                            <a class="page-link" href="#" data-page="${i}">${i}</a>
                        </li>`;
            }

            // Next button
            html += `<li class="page-item${page === totalPages || totalPages === 0 ? ' disabled' : ''}">
                        <a class="page-link" href="#" aria-label="Next" data-page="${page + 1}">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>`;

            paginationNav.innerHTML = html;

            // Add event listeners
            paginationNav.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    const goto = parseInt(this.getAttribute('data-page'));
                    if (!isNaN(goto) && goto >= 1 && goto <= totalPages && goto !== currentPage) {
                        updateMenu(goto);
                    }
                });
            });
        }

        function updateMenu(page = 1) {
            currentPage = page;
            renderMenuList(
                document.getElementById('searchInput').value.trim().toLowerCase(),
                document.getElementById('categorySelect').value,
                currentPage
            );
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('searchInput').addEventListener('input', () => updateMenu(1));
            document.getElementById('categorySelect').addEventListener('change', () => updateMenu(1));
            updateMenu();
        });
